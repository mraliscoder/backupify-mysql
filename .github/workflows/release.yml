name: Release

on:
  push:
    branches:
      - master

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Get short hash
        id: hash
        run: echo "tag=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - name: Build
        run: go build -o backupify-mysql-linux-amd64 ./cmd/backupify-mysql

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.hash.outputs.tag }}
          name: ${{ steps.hash.outputs.tag }}
          files: backupify-mysql-linux-amd64
